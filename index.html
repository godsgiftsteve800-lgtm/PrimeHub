<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PrimeHub</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#000;
    color:white;
}

header{
    background:#0a0a0a;
    padding:20px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    border-bottom:2px solid #00aaff;
}

.logo{
    color:#00aaff;
    font-size:28px;
    font-weight:bold;
}

nav a{
    color:white;
    text-decoration:none;
    margin-left:20px;
}

.hero{
    height:90vh;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    text-align:center;
    background:linear-gradient(to bottom,#000,#001f3f);
}

.hero h1{
    font-size:48px;
    color:#00aaff;
}

.hero p{
    margin-top:15px;
    font-size:18px;
    width:80%;
    max-width:600px;
}

button{
    margin-top:30px;
    padding:15px 35px;
    border:none;
    border-radius:30px;
    background:#00aaff;
    color:white;
    font-size:18px;
    cursor:pointer;
}

button:hover{
    background:#0088cc;
}

footer{
    text-align:center;
    padding:20px;
    border-top:2px solid #00aaff;
}
</style>
</head>

<body>

<header>
<div class="logo">PrimeHub</div>

<nav>
<a href="#">Home</a>
<a href="#">Services</a>
<a href="#">About</a>
<a href="#">Contact</a>
</nav>

</header>

<section class="hero">

<h1>Welcome to PrimeHub</h1>

<p>
Building the future with technology, innovation and creativity.
PrimeHub is your destination for websites, AI, trading resources and digital solutions.
</p>

<button>Get Started</button>

</section>

<footer>
© 2026 PrimeHub. All Rights Reserved.
</footer>

</body>
</html>
